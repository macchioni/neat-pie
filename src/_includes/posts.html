---
layout: default
prism: true
---

<article class="h-entry">
  <h1 class="p-name">{{title}}</h1>

  {% if rss_only %}
    <aside class="rss-club-notice">
      <tt>🔒 This post is just for the RSS readers. Welcome to the RSS Club.</tt>
    </aside>
  {% endif %}

  {% if description %}
    <p class="description p-summary">{{ description }}</p>
  {% endif %}

  <div class="breathe e-content">
    {{ content | safe }}
  </div>

  <div class="post-footer">
    <small>
      <time class="dt-published" datetime="{{ date | rssDate }}">{{ date | readableDate }}</time>
    </small>
    <a class="u-url" href="{{ page.url }}"></a>
    <a class="p-author h-card" style="display:none" href="https://macchioni.cc">Piero Macchioni</a>
  </div>

<div class="webmentions">
  <span class="wm-count" id="wm-likes">♡ –</span>
  <span class="wm-count" id="wm-reposts">↺ –</span>
</div>

<script>
  fetch(`https://webmention.io/api/count.json?target={{ metadata.url }}{{ page.url }}`)
    .then(r => r.json())
    .then(data => {
      document.getElementById('wm-likes').textContent = '♡ ' + (data.type?.like || 0);
      document.getElementById('wm-reposts').textContent = '↺ ' + (data.type?.repost || 0);
    });
</script>

</article>
